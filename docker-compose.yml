services:
  postgres:
    image: postgres:17-alpine
    container_name: url-shortener-postgres
    environment:
      POSTGRES_USER: ${APP_DATABASE__USERNAME:-postgres}
      POSTGRES_PASSWORD: ${APP_DATABASE__PASSWORD:-postgres}
      POSTGRES_DB: ${APP_DATABASE__DATABASE_NAME:-url_shortener}
    ports:
      - "${APP_DATABASE__PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${APP_DATABASE__USERNAME:-postgres} -d ${APP_DATABASE__DATABASE_NAME:-url_shortener}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: url-shortener-redis
    ports:
      - "${APP_REDIS__PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
